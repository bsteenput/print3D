services:

  php:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Déclare le domaine ET génère les labels Traefik routant vers le port 80
      # du conteneur php (c'est ça qui manquait -> d'où le 404 de Traefik).
      # Le domaine se configure dans l'UI Coolify (service php > Domains).
      SERVICE_FQDN_APP_80: "/"
      DB_HOST:         db
      DB_NAME:         ${DB_NAME:-print3d}
      DB_USER:         ${DB_USER:-print3d_user}
      DB_PASS:         ${DB_PASS}
      JWT_SECRET:      ${JWT_SECRET}
      APP_URL:         ${SERVICE_URL_APP}
      APP_ENV:         production
      MAIL_FROM:       ${MAIL_FROM:-noreply@example.com}
      MAIL_FROM_NAME:  ${MAIL_FROM_NAME:-Print3D}
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE:      ${DB_NAME:-print3d}
      MYSQL_USER:          ${DB_USER:-print3d_user}
      MYSQL_PASSWORD:      ${DB_PASS}
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
