<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────── -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <h1><span>Print</span>3D</h1>
    <p>Gestion d'impressions 3D</p>
    <div id="login-err" class="alert alert-err" style="display:none"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="l-email" autocomplete="username" placeholder="bertrand@exemple.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="l-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%" id="l-btn">Connexion</button>
  </div>
</div>

<!-- ── App shell ──────────────────────────────────────────── -->
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="logo">🖨 Print3D</div>
    <nav id="nav">
      <a href="#dashboard"  data-admin><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="#jobs"       ><span class="icon">📋</span><span>Jobs</span></a>
      <a href="#clients"    data-admin><span class="icon">👥</span><span>Clients</span></a>
      <a href="#printers"   data-admin><span class="icon">🖨</span><span>Imprimantes</span></a>
      <a href="#filaments"  data-admin><span class="icon">🧵</span><span>Matériaux</span></a>
      <a href="#settings"   data-admin><span class="icon">⚙️</span><span>Paramètres</span></a>
      <a href="#stats"      data-admin><span class="icon">📈</span><span>Statistiques</span></a>
      <button id="theme-toggle" class="theme-btn"><span class="icon">🌙</span><span>Thème</span></button>
    </nav>
    <div class="sidebar-footer">
      <strong id="sb-name"></strong>
      <a href="#" id="logout-btn"><span class="icon">↩</span><span class="nav-label">Sortir</span></a>
    </div>
  </aside>

  <main id="main">
    <div id="view"></div>
  </main>
</div>

<!-- ── STL Viewer modal ───────────────────────────────────── -->
<div id="stl-modal">
  <div id="stl-viewer-wrap">
    <div id="stl-modal-title"></div>
    <button id="stl-close">✕</button>
    <canvas id="stl-canvas"></canvas>
  </div>
</div>

<!-- ── Generic modal ─────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- Three.js + STLLoader CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
